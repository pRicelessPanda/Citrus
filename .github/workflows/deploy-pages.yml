name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Hash routing so deep links work on Pages without a 404 fallback;
      # base matches the repo subpath (pricelesspanda.github.io/Citrus/).
      - run: npm run build
        env:
          VITE_ROUTER: hash
          VITE_BASE: /Citrus/
      # The site was originally enabled in "deploy from a branch" mode, which
      # rejects Actions deployments — switch it to workflow builds.
      - name: Set Pages build type to workflow
        run: |
          curl -sf -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"build_type":"workflow"}' || echo "Pages config update skipped"
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # While the Pages site is in "deploy from a branch" mode, every push also
      # triggers GitHub's legacy Jekyll build of the raw source, which races
      # this deployment and can overwrite it. Wait for that run to finish so
      # our built site always lands last. (Permanent fix: Settings -> Pages ->
      # Source: "GitHub Actions", which stops the legacy build entirely.)
      - name: Wait out any racing legacy branch build
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs?head_sha=${{ github.sha }}&per_page=20" \
              | jq -r '[.workflow_runs[] | select(.name=="pages build and deployment")] | if length==0 then "none" else (if all(.[]; .status=="completed") then "done" else "running" end) end')
            echo "legacy pages build: $STATUS (check $i)"
            if [ "$STATUS" = "done" ]; then break; fi
            if [ "$STATUS" = "none" ] && [ "$i" -ge 3 ]; then break; fi
            sleep 10
          done
      - id: deployment
        uses: actions/deploy-pages@v4
